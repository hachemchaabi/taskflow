databases:
  - name: ctm-db
    plan: free

services:
  - type: web
    name: ctm-api
    runtime: docker
    plan: free
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ctm-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
